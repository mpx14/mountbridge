name: Lint

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Ruff + syntax check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      - name: Lint with ruff
        run: ruff check mountbridge/

      - name: Check syntax (ast.parse)
        run: |
          python3 - << 'EOF'
          import ast, pathlib, sys
          errors = []
          for p in pathlib.Path("mountbridge").rglob("*.py"):
              try:
                  ast.parse(p.read_text(encoding="utf-8"))
              except SyntaxError as e:
                  errors.append(f"{p}:{e.lineno}: {e.msg}")
          if errors:
              print("\n".join(errors))
              sys.exit(1)
          print(f"All {len(list(pathlib.Path('mountbridge').rglob('*.py')))} files OK")
          EOF
